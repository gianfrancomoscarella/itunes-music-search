<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Argentina</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    <script src="script.js" defer></script>
</head>

<body>
    <h1>🎶 Spotify Argentina</h1>

    <div class="formulario">
        <input type="text" id="titulo" placeholder="Título de la canción">
        <input type="text" id="artista" placeholder="Artista">
    </div>

    <div class="botones">
        <button id="btnMostrar">Mostrar Lista</button>
        <button id="btnSugerencia">🎧 Sugerencia Musical</button>
        <button id="btnDarkMode">🌙 Modo Oscuro</button>
    </div>
    <div id="mensajes"></div>
</body>
</html>
