<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTunes Music Search</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    <script src="script.js" defer></script>
</head>

<body>
    <h1>🎶 iTunes Music Search</h1>

    <div class="formulario">
        <input type="text" id="titulo" placeholder="Buscá una canción o artista...">
        
    </div>

    <div class="botones">
        <button id="btnMostrar">⭐ Mi Lista <span id="badgeLista" class="badge hidden"></span></button>
        <button id="btnSugerencia">🎧 Sugerencia Musical</button>
        <button id="btnDarkMode">🌙 Modo Oscuro</button>
    </div>
    <div id="mensajes"></div>
</body>
</html>
